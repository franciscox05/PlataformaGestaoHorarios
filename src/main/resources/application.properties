# Ligacao a Base de Dados (PostgreSQL)
# Credenciais lidas de variaveis de ambiente; fallback para valores locais de desenvolvimento.
# ATENCAO: Nunca commitar credenciais reais. Usar variaveis de ambiente em producao.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/gestaohorarios?stringtype=unspecified}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:projeto2026}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuracoes do Hibernate (JPA)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

