<!doctype html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Levi's Staff Portal Web - Login</title>
    <link rel="stylesheet" href="/web/css/app.css">
</head>
<body class="web-auth-body">
<main class="web-auth-shell">
    <section class="web-auth-panel">
        <h1>Staff Portal Web</h1>
        <p>Inicia sessao para consultar e gerar horarios.</p>

        <form method="post" action="/web/login" class="web-form">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required>

            <label for="password">Palavra-passe</label>
            <input id="password" name="password" type="password" required>

            <button type="submit">Entrar</button>
        </form>

        <p class="web-feedback web-feedback-error" th:if="${erro}" th:text="${erro}"></p>
    </section>
</main>
</body>
</html>
