<!doctype html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{web/fragments :: head('Levis Staff Portal Web - Perfil')}"></head>
<body>
<header th:replace="~{web/fragments :: shellHeader}"></header>

<div class="web-shell">
    <aside th:replace="~{web/fragments :: shellSidebar}"></aside>

    <main class="web-content">
        <h1>Modulo Perfil</h1>
        <p class="web-feedback web-feedback-success" th:if="${sucesso}" th:text="${sucesso}"></p>
        <p class="web-feedback web-feedback-error" th:if="${erro}" th:text="${erro}"></p>

        <section class="web-kpis" th:if="${resumo != null}">
            <article class="web-kpi">
                <h2>Horas este mes</h2>
                <strong th:text="${resumo.horasEsteMes()}"></strong>
            </article>
            <article class="web-kpi">
                <h2>Folgas pendentes</h2>
                <strong th:text="${resumo.pedidosPendentes()}"></strong>
            </article>
            <article class="web-kpi">
                <h2>Folgas aprovadas</h2>
                <strong th:text="${resumo.pedidosAprovados()}"></strong>
            </article>
            <article class="web-kpi">
                <h2>Turnos futuros</h2>
                <strong th:text="${resumo.turnosFuturos()}"></strong>
            </article>
        </section>

        <section class="web-card" th:if="${resumo != null}">
            <h2>Dados do utilizador</h2>
            <p><strong>Nome atual:</strong> <span th:text="${resumo.nome()}"></span></p>
            <p><strong>Email atual:</strong> <span th:text="${resumo.email()}"></span></p>
            <p><strong>Telemovel atual:</strong> <span th:text="${resumo.telemovel()}"></span></p>
            <p><strong>Estado:</strong> <span th:text="${resumo.estado()}"></span></p>
            <p><strong>Loja:</strong> <span th:text="${resumo.lojaAtual()}"></span></p>
            <p><strong>Cargo:</strong> <span th:text="${resumo.cargoAtual()}"></span></p>
            <p><strong>Data de entrada:</strong> <span th:text="${resumo.dataEntrada()}"></span></p>
            <p><strong>Proximo turno:</strong> <span th:text="${resumo.proximoTurno()}"></span></p>
        </section>

        <section class="web-grid-two" th:if="${resumo != null}">
            <article class="web-card">
                <h2>Atualizar nome</h2>
                <form method="post" action="/web/perfil/nome" class="web-form">
                    <label for="nome">Novo nome</label>
                    <input id="nome" name="nome" type="text" required>
                    <button type="submit">Guardar nome</button>
                </form>
            </article>

            <article class="web-card">
                <h2>Atualizar email</h2>
                <form method="post" action="/web/perfil/email" class="web-form">
                    <label for="email">Novo email</label>
                    <input id="email" name="email" type="email" required>
                    <button type="submit">Guardar email</button>
                </form>
            </article>

            <article class="web-card">
                <h2>Atualizar telemovel</h2>
                <form method="post" action="/web/perfil/telemovel" class="web-form">
                    <label for="telemovel">Novo telemovel</label>
                    <input id="telemovel" name="telemovel" type="text" maxlength="9" required>
                    <button type="submit">Guardar telemovel</button>
                </form>
            </article>

            <article class="web-card">
                <h2>Atualizar palavra-passe</h2>
                <form method="post" action="/web/perfil/password" class="web-form">
                    <label for="passwordAtual">Password atual</label>
                    <input id="passwordAtual" name="passwordAtual" type="password" required>
                    <label for="novaPassword">Nova password</label>
                    <input id="novaPassword" name="novaPassword" type="password" required>
                    <label for="confirmarPassword">Confirmar password</label>
                    <input id="confirmarPassword" name="confirmarPassword" type="password" required>
                    <button type="submit">Atualizar password</button>
                </form>
            </article>
        </section>
    </main>
</div>
</body>
</html>
